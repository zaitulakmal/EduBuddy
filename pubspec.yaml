name: edubuddy
description: "EduBuddy - Interactive Learning App for Kids"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # State Management
  provider: ^6.1.2

  # UI & Animations
  google_fonts: ^6.2.1
  lottie: ^3.1.3
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.4
  shimmer: ^3.0.0
  confetti: ^0.7.0
  animated_text_kit: ^4.2.2

  # Media
  video_player: ^2.9.2
  chewie: ^1.8.5
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1

  # Storage & Utils
  shared_preferences: ^2.3.2
  intl: ^0.20.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
